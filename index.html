<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      header {
        background-color: #333;
        color: #fff;
        display: flex;
        justify-content: space-between;
        padding: 1em;
      }

      nav ul {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      nav a {
        color: #fff;
        text-decoration: none;
        padding: 1em;
      }

      main {
        display: flex;
        flex-wrap: wrap;
        padding: 1em;
      }

      section {
        width: 100%;
        padding: 1em;
      }

      footer {
        background-color: #333;
        color: #fff;
        display: flex;
        justify-content: center;
        padding: 1em;
        text-align: center;
      }

      /* Dark mode styles */
      .dark-mode header {
        background-color: #000;
      }

      .dark-mode main {
        background-color: #333;
        color: #fff;
      }

      .dark-mode footer {
        background-color: #000;
      }

      /* Light mode styles */
      .light-mode header {
        background-color: #fff;
        color: #333;
      }

      .light-mode main {
        background-color: #fff;
        color: #333;
      }

      .light-mode footer {
        background-color: #fff;
        color: #333;
      }
    </style>
  </head>
  <body class="light-mode">
    <header>
      <h1>My Portfolio</h1>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Projects</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <h2>Welcome to my portfolio</h2>
        <p>I am a web developer and this is my portfolio website.</p>
      </section>
    </main>
    <footer>
      <p>Copyright &copy; 2023</p>
    </footer>
    <button id="mode-toggle">Switch mode</button>
    <script>
      const toggle = document.querySelector('#mode-toggle');
const body = document.querySelector('body');

const currentMode = localStorage.getItem('mode') || 'light-mode';

body.classList.add(currentMode);

toggle.addEventListener('click', () => {
  body.classList.toggle('light-mode');
  body.classList.toggle('dark-mode');

  const mode = body.classList.contains('light-mode') ? 'light-mode' : 'dark-mode';
  localStorage.setItem('mode', mode);
});
</script>
    </body>
  </html>
