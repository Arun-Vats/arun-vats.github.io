<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    
    <!-- Add the Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">

    <!-- Add your stylesheet -->
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="light-mode">
    <!-- Add the dark/light mode toggle button -->
    <button id="switch-mode">
      <i class="fas fa-moon" id="dark-icon"></i>
      <i class="far fa-lightbulb" id="light-icon"></i>
    </button>

    <!-- Add your portfolio content here -->
    <header>
      <h1>My Portfolio</h1>
      <nav>
        <ul>
          <li><a href="#about">About</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="about">
        <h2>About Me</h2>
        <p>I am a web developer with a passion for building beautiful and functional websites.</p>
      </section>

      <section id="projects">
        <h2>My Projects</h2>
        <ul>
          <li><a href="#">Project 1</a></li>
          <li><a href="#">Project 2</a></li>
          <li><a href="#">Project 3</a></li>
        </ul>
      </section>

      <section id="contact">
        <h2>Get In Touch</h2>
        <form action="#">
          <input type="text" placeholder="Name">
          <input type="email" placeholder="Email">
          <textarea placeholder="Message"></textarea>
          <input type="submit" value="Send">
        </form>
      </section>
    </main>

    <!-- Add the JavaScript for the dark/light mode toggle -->
    <script>
      const switchMode = document.querySelector("#switch-mode");
      switchMode.addEventListener("click", function() {
        document.body.classList.toggle("dark-mode");
        document.body.classList.toggle("light-mode");
      });
    </script>
  </body>
</html>
